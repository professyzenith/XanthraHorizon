name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Type Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: npx eslint app lib components --max-warnings 0

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          # Provide dummy env vars so Next.js doesn't fail config validation
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key-xxxxxxxxxxxxxxxxxxxxxxxxxx
          RESEND_API_KEY: re_placeholder_key
          RESEND_FROM_EMAIL: noreply@placeholder.com
          GEMINI_API_KEY: placeholder-gemini-api-key-xxxxxxxxxxxxxxxxxx
          CRON_SECRET: placeholder-cron-secret-32-chars-xx
          NEXT_PUBLIC_APP_URL: http://localhost:3000
